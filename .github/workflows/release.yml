name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Require tag and package versions to match
        run: node -e "const expected='v'+require('./package.json').version; if(process.env.GITHUB_REF_NAME!==expected){console.error('Expected tag '+expected+', received '+process.env.GITHUB_REF_NAME); process.exit(1)}"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate release
        run: npm run check

      - name: Build package archive
        run: npm pack

      - name: Upload package archive
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error

      - name: Publish to npm with trusted publishing
        run: npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
